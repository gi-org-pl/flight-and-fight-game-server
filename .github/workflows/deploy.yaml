name: 'deploy'

on:
  push:
    branches: ['main']

jobs:
  tag:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: 'Clone repository'
        uses: 'actions/checkout@v6'
      - name: 'Release and push git tag'
        run: "git tag $(jq -r '.version' package.json) && git push --tags"
      - name: 'Create a GitHub release'
        run: "gh release create $(jq -r '.version' package.json) --generate-notes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  push:
    needs: 'tag'
    runs-on: 'ubuntu-24.04'
    steps:
      - name: 'Login to ghcr.io'
        uses: 'docker/login-action@v2'
        with:
          registry: 'ghcr.io'
          username: '${{github.actor}}'
          password: '${{secrets.GITHUB_TOKEN}}'
      - name: 'Clone repository'
        uses: 'actions/checkout@v6'
      - name: 'Set up environment'
        run: 'cp .env.dist .env'
      - name: 'Build app docker image'
        run: |
          AUTHOR=$(jq -r '.author' package.json)
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)

          IMAGE="ghcr.io/${AUTHOR}/${NAME}"
          docker build --target production -t "${IMAGE}:${VERSION}" .

          # tag same image as :latest
          docker tag "${IMAGE}:${VERSION}" "${IMAGE}:latest"
      - name: 'Push docker image to ghcr.io'
        run: |
          AUTHOR=$(jq -r '.author' package.json)
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)

          IMAGE="ghcr.io/${AUTHOR}/${NAME}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
  deploy:
    needs: 'push'
    runs-on: 'ubuntu-24.04'
    steps:
      - name: 'Run image in production'
        uses: 'appleboy/ssh-action@v1.2.0'
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          envs: DATABASE_URL
          script: |
            docker rm -f faf-app || true
            docker run -d \
              --name faf-app \
              --network faf-net \
              --restart unless-stopped \
              --pull always \
              -e NODE_ENV=production \
              -e DATABASE_URL="$DATABASE_URL" \
              -p 80:3000 \
              ghcr.io/gi-org-pl/flight-and-fight-game-server:latest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
