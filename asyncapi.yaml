asyncapi: 3.0.0

info:
  title: Flight and Fight game WebSocket API
  version: 0.11.0
  description: >
    Real-time game channel (socket.io). Two players connect to the same
    session, each submit their characters, and once both have chosen the game
    becomes READY. They then take turns attacking and defending, and the turn
    alternates after each completed exchange.


    Each attack carries a quick-time multiplier and the attacking/attacked
    character. Damage is `1 * quickTimeEventMultiplier * superpowerFactor`, where
    the factor is 1.5 when the attacker's superpower is strong against the
    defender's, 0.66 when it is weak, and 1 otherwise. Damage is resolved when
    the defender defends (the defender's counter-damage uses the same formula
    with the characters swapped): the larger of the two damages is subtracted
    from the losing character, equal damage deals nothing. When a character's
    health reaches zero it dies and a `characterDied` event is broadcast.


    Authentication is performed during the socket.io handshake: pass
    `auth: { token: <playerId>, sessionId: <sessionId> }`. The connection is
    rejected with a `connect_error` ("Unauthorized") unless the token is a valid
    player id that belongs to the given session.

servers:
  game:
    host: localhost:3000
    pathname: /game
    protocol: socket.io
    description: Local development. The socket.io namespace is `/game`.

channels:
  game:
    address: /game
    title: Game channel
    description: Per-session channel; each player joins a room named by the session id.
    messages:
      selectCharacters:
        $ref: '#/components/messages/selectCharacters'
      attack:
        $ref: '#/components/messages/attack'
      defend:
        $ref: '#/components/messages/defend'
      session:
        $ref: '#/components/messages/session'
      ready:
        $ref: '#/components/messages/ready'
      attacked:
        $ref: '#/components/messages/attacked'
      charactersUpdated:
        $ref: '#/components/messages/charactersUpdated'
      turnChanged:
        $ref: '#/components/messages/turnChanged'
      characterDied:
        $ref: '#/components/messages/characterDied'
      gameFinished:
        $ref: '#/components/messages/gameFinished'
      exception:
        $ref: '#/components/messages/exception'

operations:
  selectCharacters:
    action: receive
    channel:
      $ref: '#/channels/game'
    summary: A player submits their 5 characters.
    description: >
      Sent by each player after connecting. Rejected with an `exception` if the
      selection is not exactly 5 unique known characters, or if the game is
      already READY. A player may re-submit to change their picks until the game
      is READY. Once both players have submitted, the game becomes READY and a
      `ready` message is broadcast to the room.
    messages:
      - $ref: '#/channels/game/messages/selectCharacters'
  attack:
    action: receive
    channel:
      $ref: '#/channels/game'
    summary: The attacking player declares an attack.
    description: >
      Emitted by the player whose turn it is (`currentlyAttackingPlayerId`),
      carrying the quick-time multiplier (1.00–2.00) and the attacking and
      attacked character types. The attacker's damage is computed now and held
      until the defender defends. Rejected with an `exception` if it is not the
      sender's turn, an attack is already awaiting defense, or the payload fails
      validation.
    messages:
      - $ref: '#/channels/game/messages/attack'
  defend:
    action: receive
    channel:
      $ref: '#/channels/game'
    summary: The defending player defends, completing the exchange.
    description: >
      Emitted by the non-attacking player after an attack, carrying their own
      quick-time multiplier. The server compares the attacker's and defender's
      damage and subtracts the larger from the losing character; equal damage
      deals nothing. If the hit drops a character's health to zero it dies and a
      `characterDied` message is broadcast. When that was a player's last living
      character the game ends: the session becomes `FINISHED` and a
      `gameFinished` message is broadcast instead of advancing the turn.
      Otherwise the turn completes, flipping `currentlyAttackingPlayerId` to the
      other player. Rejected with an `exception` if the sender is the attacker,
      no attack is pending, the game is already finished, or the payload fails
      validation.
    messages:
      - $ref: '#/channels/game/messages/defend'
  session:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Current session state, sent to a player right after they connect.
    messages:
      - $ref: '#/channels/game/messages/session'
  ready:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Broadcast to the room once both players have chosen their characters.
    description: >
      Carries the updated session (`state` is READY and
      `currentlyAttackingPlayerId` is the first player, who attacks first).
    messages:
      - $ref: '#/channels/game/messages/ready'
  attacked:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Broadcast to the room when the attacker declares an attack.
    messages:
      - $ref: '#/channels/game/messages/attacked'
  charactersUpdated:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Sent to the defending player when an attack is declared, with their characters' current stats.
    messages:
      - $ref: '#/channels/game/messages/charactersUpdated'
  turnChanged:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Broadcast to the room with the updated session after the turn flips.
    messages:
      - $ref: '#/channels/game/messages/turnChanged'
  characterDied:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Broadcast to the room when a character's health reaches zero.
    description: Identifies the owning player and the character that died.
    messages:
      - $ref: '#/channels/game/messages/characterDied'
  gameFinished:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Broadcast to the room when a player loses their last character.
    description: >
      Sent once the session becomes `FINISHED`. Identifies the winner (the
      player with characters still alive) and the loser (whose last character
      just died). No further `attack`/`defend` is accepted.
    messages:
      - $ref: '#/channels/game/messages/gameFinished'
  exception:
    action: send
    channel:
      $ref: '#/channels/game'
    summary: Sent to a player whose action was rejected.
    messages:
      - $ref: '#/channels/game/messages/exception'

components:
  messages:
    selectCharacters:
      name: selectCharacters
      title: Select characters
      summary: Submit the 5 characters for the sending player.
      payload:
        $ref: '#/components/schemas/SelectCharacters'
    attack:
      name: attack
      title: Attack
      summary: Declare an attack with a quick-time multiplier and the attacking/attacked characters.
      payload:
        $ref: '#/components/schemas/AttackCommand'
    defend:
      name: defend
      title: Defend
      summary: Defend against the pending attack with a quick-time multiplier.
      payload:
        $ref: '#/components/schemas/DefendCommand'
    session:
      name: session
      title: Session state
      payload:
        $ref: '#/components/schemas/Session'
    ready:
      name: ready
      title: Game ready
      payload:
        $ref: '#/components/schemas/Session'
    attacked:
      name: attacked
      title: Attack declared
      payload:
        $ref: '#/components/schemas/Attacked'
    charactersUpdated:
      name: charactersUpdated
      title: Updated characters
      payload:
        $ref: '#/components/schemas/CharacterList'
    turnChanged:
      name: turnChanged
      title: Turn changed
      payload:
        $ref: '#/components/schemas/Session'
    characterDied:
      name: characterDied
      title: Character died
      payload:
        $ref: '#/components/schemas/CharacterDied'
    gameFinished:
      name: gameFinished
      title: Game finished
      payload:
        $ref: '#/components/schemas/GameFinished'
    exception:
      name: exception
      title: Error
      payload:
        $ref: '#/components/schemas/Exception'

  schemas:
    Ulid:
      type: string
      example: 01ARZ3NDEKTSV4RRFFQ69G5FAV

    SessionState:
      type: string
      enum:
        - WAITING_FOR_SECOND_PLAYER
        - WAITING_FOR_CHARACTER_CHOICE
        - READY
        - FINISHED

    Session:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Ulid'
        state:
          $ref: '#/components/schemas/SessionState'
        firstPlayerId:
          $ref: '#/components/schemas/Ulid'
        secondPlayerId:
          type: string
          nullable: true
        currentlyAttackingPlayerId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Attacked:
      type: object
      properties:
        attackingPlayerId:
          $ref: '#/components/schemas/Ulid'

    CharacterType:
      type: string
      enum:
        - IRIS
        - ZEPHYR
        - WENDY
        - SKYE
        - SUNNY
        - AURA
        - NEIL
        - GALE
        - THORA
        - VEGA

    Superpower:
      type: string
      enum:
        - LIGHT
        - DARK
        - WATER
        - GRASS
        - FIRE
        - ELECTRIC
        - GROUND
        - AIR
        - ICE

    CharacterStats:
      type: object
      properties:
        intelligence:
          type: integer
        defense:
          type: integer
        power:
          type: integer
        health:
          type: number
          description: Current health; fractional after damage, 0 when the character is dead.

    Character:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CharacterType'
        superpower:
          $ref: '#/components/schemas/Superpower'
        stats:
          $ref: '#/components/schemas/CharacterStats'
        isDead:
          type: boolean
          example: false

    CharacterList:
      type: array
      items:
        $ref: '#/components/schemas/Character'

    SelectCharacters:
      type: object
      properties:
        characters:
          type: array
          minItems: 5
          maxItems: 5
          uniqueItems: true
          items:
            $ref: '#/components/schemas/CharacterType'

    QuickTimeEventMultiplier:
      type: number
      minimum: 1
      maximum: 2
      example: 1.5

    AttackCommand:
      type: object
      additionalProperties: false
      required:
        - quickTimeEventMultiplier
        - attackingCharacter
        - attackedCharacter
      properties:
        quickTimeEventMultiplier:
          $ref: '#/components/schemas/QuickTimeEventMultiplier'
        attackingCharacter:
          $ref: '#/components/schemas/CharacterType'
        attackedCharacter:
          $ref: '#/components/schemas/CharacterType'

    DefendCommand:
      type: object
      additionalProperties: false
      required:
        - quickTimeEventMultiplier
      properties:
        quickTimeEventMultiplier:
          $ref: '#/components/schemas/QuickTimeEventMultiplier'

    CharacterDied:
      type: object
      properties:
        playerId:
          $ref: '#/components/schemas/Ulid'
        character:
          $ref: '#/components/schemas/CharacterType'

    GameFinished:
      type: object
      properties:
        winnerId:
          $ref: '#/components/schemas/Ulid'
        loserId:
          $ref: '#/components/schemas/Ulid'

    Exception:
      oneOf:
        - $ref: '#/components/schemas/BusinessException'
        - $ref: '#/components/schemas/ValidationException'

    BusinessException:
      type: object
      description: A rejected action, e.g. acting out of turn or defending with no pending attack.
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: It is not your turn to attack.
        cause:
          type: object
          properties:
            pattern:
              type: string
              example: attack
            data:
              type: object
              description: The payload that was sent with the rejected message.

    ValidationException:
      type: object
      description: The message payload failed validation.
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Message validation failed.
        violations:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            quickTimeEventMultiplier:
              - quickTimeEventMultiplier must not be greater than 2
